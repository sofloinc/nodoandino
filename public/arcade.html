<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andino Arcade | Neon Arkanoid</title>
    <style>
        body {
            margin: 0;
            background: #020617;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        canvas {
            border: 4px solid #3b82f6;
            box-shadow: 0 0 20px #3b82f6, inset 0 0 10px #3b82f6;
            border-radius: 10px;
            background: #000;
            cursor: none;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h1 {
            margin: 0;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #3b82f6;
            text-shadow: 0 0 10px #3b82f6, 0 0 20px #3b82f6;
        }
        .stats {
            display: flex;
            gap: 50px;
            margin-top: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #fbbf24;
            text-shadow: 0 0 5px #fbbf24;
        }
        .btn-back {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid #3b82f6;
            color: #3b82f6;
            text-decoration: none;
            border-radius: 5px;
            transition: 0.3s;
        }
        .btn-back:hover {
            background: #3b82f6;
            color: #fff;
            box-shadow: 0 0 15px #3b82f6;
        }
    </style>
</head>
<body>
    <a href="/" class="btn-back">← Volver</a>
    <div class="header">
        <h1>Andino Arcade</h1>
        <p>Neon Arkanoid Edition</p>
    </div>
    <canvas id="gameCanvas" width="800" height="500"></canvas>
    <div class="stats">
        <div>Score: <span id="score">0</span></div>
        <div>Vidas: <span id="lives">3</span></div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreDisplay = document.getElementById("score");
        const livesDisplay = document.getElementById("lives");

        // Game State
        let score = 0;
        let lives = 3;
        let gameRunning = false;

        // Ball
        let ballRadius = 8;
        let x = canvas.width / 2;
        let y = canvas.height - 30;
        let dx = 4;
        let dy = -4;

        // Paddle
        const paddleHeight = 12;
        const paddleWidth = 100;
        let paddleX = (canvas.width - paddleWidth) / 2;

        // Bricks
        const brickRowCount = 5;
        const brickColumnCount = 9;
        const brickWidth = 75;
        const brickHeight = 20;
        const brickPadding = 10;
        const brickOffsetTop = 30;
        const brickOffsetLeft = 30;

        const bricks = [];
        for (let c = 0; c < brickColumnCount; c++) {
            bricks[c] = [];
            for (let r = 0; r < brickRowCount; r++) {
                bricks[c][r] = { x: 0, y: 0, status: 1, color: `hsl(${r * 40 + 180}, 100%, 60%)` };
            }
        }

        // Controls
        document.addEventListener("mousemove", (e) => {
            const relativeX = e.clientX - canvas.offsetLeft;
            if (relativeX > 0 && relativeX < canvas.width) {
                paddleX = relativeX - paddleWidth / 2;
            }
        });

        canvas.addEventListener("click", () => {
            if (!gameRunning) {
                gameRunning = true;
                draw();
            }
        });

        function collisionDetection() {
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    const b = bricks[c][r];
                    if (b.status === 1) {
                        if (x > b.x && x < b.x + brickWidth && y > b.y && y < b.y + brickHeight) {
                            dy = -dy;
                            b.status = 0;
                            score += 10;
                            scoreDisplay.textContent = score;
                            if (score === brickRowCount * brickColumnCount * 10) {
                                alert("¡NODOANDINO WIN! FELICIDADES");
                                document.location.reload();
                            }
                        }
                    }
                }
            }
        }

        function drawBall() {
            ctx.beginPath();
            ctx.arc(x, y, ballRadius, 0, Math.PI * 2);
            ctx.fillStyle = "#fff";
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#3b82f6";
            ctx.fill();
            ctx.closePath();
            ctx.shadowBlur = 0;
        }

        function drawPaddle() {
            ctx.beginPath();
            ctx.rect(paddleX, canvas.height - paddleHeight - 10, paddleWidth, paddleHeight);
            ctx.fillStyle = "#3b82f6";
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#3b82f6";
            ctx.fill();
            ctx.closePath();
            ctx.shadowBlur = 0;
        }

        function drawBricks() {
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    if (bricks[c][r].status === 1) {
                        const brickX = c * (brickWidth + brickPadding) + brickOffsetLeft;
                        const brickY = r * (brickHeight + brickPadding) + brickOffsetTop;
                        bricks[c][r].x = brickX;
                        bricks[c][r].y = brickY;
                        ctx.beginPath();
                        ctx.rect(brickX, brickY, brickWidth, brickHeight);
                        ctx.fillStyle = bricks[c][r].color;
                        ctx.shadowBlur = 10;
                        ctx.shadowColor = bricks[c][r].color;
                        ctx.fill();
                        ctx.closePath();
                        ctx.shadowBlur = 0;
                    }
                }
            }
        }

        function draw() {
            if (!gameRunning) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBricks();
            drawBall();
            drawPaddle();
            collisionDetection();

            // Walls
            if (x + dx > canvas.width - ballRadius || x + dx < ballRadius) {
                dx = -dx;
            }
            if (y + dy < ballRadius) {
                dy = -dy;
            } else if (y + dy > canvas.height - ballRadius - 10) {
                if (x > paddleX && x < paddleX + paddleWidth) {
                    dy = -dy;
                    // Speed up slightly
                    dx *= 1.05;
                    dy *= 1.05;
                } else {
                    lives--;
                    livesDisplay.textContent = lives;
                    if (!lives) {
                        alert("GAME OVER - NODOANDINO");
                        document.location.reload();
                    } else {
                        x = canvas.width / 2;
                        y = canvas.height - 30;
                        dx = 4;
                        dy = -4;
                        paddleX = (canvas.width - paddleWidth) / 2;
                    }
                }
            }

            x += dx;
            y += dy;
            requestAnimationFrame(draw);
        }

        // Initial screen
        ctx.font = "30px Orbitron";
        ctx.fillStyle = "#3b82f6";
        ctx.textAlign = "center";
        ctx.fillText("Haz clic para jugar", canvas.width / 2, canvas.height / 2);
    </script>
</body>
</html>
